{{ define "main" }}
<section class="friends-page">
  <h1 class="glitch" data-text="{{ .Title }}">{{ .Title }}</h1>
  {{ with .Content }}<div class="content prose">{{ . }}</div>{{ end }}

  <div class="friends-grid">
    {{ range .Params.links }}
      <a class="friend-card" href="{{ .url }}" target="_blank" rel="noopener noreferrer">
        <span class="friend-name">{{ .name }}</span>
        <span class="friend-desc">{{ .desc }}</span>
        <span class="friend-url">{{ .url }} &gt;&gt;</span>
      </a>
    {{ end }}
  </div>
</section>
{{ end }}
