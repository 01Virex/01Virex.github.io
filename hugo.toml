baseURL = "https://01virex.github.io/"
locale = "zh-CN"
title = "01Virex"
theme = "cyberpunk"
enableRobotsTXT = true

# 首页输出:HTML 页面 + JSON 搜索索引 + RSS 订阅
[outputs]
  home = ["HTML", "JSON", "RSS"]

# 分类维度:标签(tag)、分类(category)、系列/专栏(series)
[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"

[params]
  subtitle = "Wake the fuck up, samurai. // Gaming & Tech"
  description = "一个赛博朋克风格的 Hugo 站点"
  footer = "© 2026 01Virex"
  author = "01Virex"
  # 社交分享默认图(放一张图到 static/img/og-cover.png 即可启用)
  ogImage = "/img/og-cover.png"
  # 可选:社交账号,用于 JSON-LD sameAs(填了才输出)
  # twitter = "@yourhandle"

  # Giscus 评论(基于 GitHub Discussions,免费无后端)
  # 启用步骤见 速查表.md「评论功能」一章:
  #   1. 仓库开启 Discussions  2. 安装 giscus app  3. 去 giscus.app 生成下面四个 ID
  [params.giscus]
    enable     = true          # 填好下面四项后改成 true 即开启
    repo       = "01Virex/01Virex.github.io"
    repoId     = "R_kgDOS8fi9A"             # 从 giscus.app 复制
    category   = "Announcements"
    categoryId = "DIC_kwDOS8fi9M4C_Vm3"             # 从 giscus.app 复制
    mapping    = "pathname"
    theme      = "dark_dimmed"
    lang       = "zh-CN"

  # 背景数据雨(Matrix 字符雨)—— 可自定义
  [params.dataRain]
    enable   = true          # 开关:false 关闭
    color    = "#00F0FF"     # 字符颜色(默认青蓝)
    chars    = "01ｱｲｳｴｵｶｷｸｹｺ日月火水木金土"  # 飘落的字符集
    fontSize = 16            # 字号(px)
    speed    = 55            # 下落速度(ms,越小越快)
    opacity  = 0.18          # 整体透明度(0~1,越小越淡)

[menu]
  [[menu.main]]
    name = "首页"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "文章"
    url = "/posts/"
    weight = 2
  [[menu.main]]
    name = "动态"
    url = "/moments/"
    weight = 3
  [[menu.main]]
    name = "分类"
    url = "/categories/"
    weight = 4
  [[menu.main]]
    name = "关于"
    url = "/about/"
    weight = 5
  [[menu.main]]
    name = "归档"
    url = "/archives/"
    weight = 6
  [[menu.main]]
    name = "友链"
    url = "/friends/"
    weight = 7
  [[menu.main]]
    name = "标签"
    url = "/tags/"
    weight = 8

[markup]
  [markup.highlight]
    style = "dracula"
    noClasses = true
  [markup.goldmark.renderer]
    unsafe = true

# 相关文章:按相同标签/关键词推荐
[related]
  includeNewer = true
  threshold = 50
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "categories"
    weight = 60
  [[related.indices]]
    name = "title"
    weight = 20
